name: SBOM
on:
  push: { branches: [main] }
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  sbom:
    runs-on: ${{ vars.DEVDOCS_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Generate CycloneDX SBOM (pnpm lockfile)
        run: npx --yes @cyclonedx/cdxgen@latest -t pnpm -o sbom.json --no-recurse
      - uses: actions/upload-artifact@v4
        with: { name: sbom, path: sbom.json }
