name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ${{ vars.DEVDOCS_RUNNER || 'ubuntu-latest' }}
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        with:
          version: npm run version
          publish: npm run publish
