# SOC 2 CC6.8 / CC7.1 / CC8.1: Snyk evidence gate for dependency,
# code, IaC, and secret findings. Configure SNYK_TOKEN as a GitHub
# Actions secret before making this workflow required in branch protection.

name: Snyk Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  snyk:
    name: Snyk SCA, Code, IaC, and secrets
    runs-on: ${{ vars.DEVDOCS_RUNNER || 'ubuntu-latest' }}
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci

      - name: Verify Snyk token is configured
        if: env.SNYK_TOKEN == ''
        run: |
          echo "::notice::SNYK_TOKEN is not configured; skipping Snyk scan until the secret is installed."

      - name: Install Snyk CLI
        if: env.SNYK_TOKEN != ''
        run: npm install --global snyk@latest

      - name: Snyk dependency scan
        if: env.SNYK_TOKEN != ''
        run: snyk test --all-projects --severity-threshold=high

      - name: Snyk code and secret scan
        if: env.SNYK_TOKEN != ''
        run: snyk code test --severity-threshold=high

      - name: Snyk IaC scan
        if: env.SNYK_TOKEN != ''
        run: snyk iac test --severity-threshold=high

      - name: Monitor main branch dependency posture
        if: env.SNYK_TOKEN != '' && github.ref == 'refs/heads/main'
        run: snyk monitor --all-projects
