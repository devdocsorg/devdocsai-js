name: ci

# RUNNER: hosted `ubuntu-latest` is pinned (not `vars.DEVDOCS_RUNNER ||
# 'ubuntu-latest'`). devdocsai-js is the fleet's only PUBLIC repo, so hosted
# Actions minutes are FREE and the org's private-repo billing block does not
# apply. The repo vars DEVDOCS_RUNNER/DEVDOCS_HEAVY_RUNNER were set, which forced
# these jobs onto a self-hosted pool with 0 runners registered for this repo,
# hanging them QUEUED indefinitely. See ci-universal.yml for the full rationale.
# (DEV-872)

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:packages
      - run: >
          pnpm
          --filter with-css-modules
          --filter with-custom-trigger
          --filter with-custom-trigger-react
          --filter with-docusaurus
          --filter with-docusaurus-swizzled
          --filter with-init
          --filter with-devdocsai-web
          --filter with-next
          run build
        env:
          DEVDOCSAI_PROJECT_KEY: ${{ secrets.DEVDOCSAI_PROJECT_KEY }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - uses: codecov/codecov-action@v4
