name: ci

# RUNNER: hosted `ubuntu-latest` is pinned (not `vars.DEVDOCS_RUNNER ||
# 'ubuntu-latest'`). devdocsai-js is the fleet's only PUBLIC repo, so hosted
# Actions minutes are FREE and the org's private-repo billing block does not
# apply. The repo vars DEVDOCS_RUNNER/DEVDOCS_HEAVY_RUNNER were set, which forced
# these jobs onto a self-hosted pool with 0 runners registered for this repo,
# hanging them QUEUED indefinitely. See ci-universal.yml for the full rationale.
# (DEV-872)

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
  # NODE: pinned to 22 (not the repo's runtime target of 24). Two constraints
  # bracket the version:
  #   - UPPER: the test stack uses msw@1, whose fetch interceptor rebuilds
  #     outgoing Requests through Node's undici. The undici in Node 24 rejects
  #     jsdom's AbortSignal ("Expected signal to be an instance of AbortSignal"),
  #     failing every fetch-hook test. Node <= 22 is unaffected.
  #   - LOWER: pnpm 11.0.9 (the repo's packageManager pin) requires Node >= 22.13,
  #     so Node 20 crashes the pnpm CLI ("requires at least Node.js v22.13").
  # Node 22 satisfies both. Bump to 24 once msw is upgraded to v2. (DEV-872 / phase0)
  NODE_VERSION: '22'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:packages
      - run: >
          pnpm --filter with-css-modules --filter with-custom-trigger --filter
          with-custom-trigger-react --filter with-docusaurus --filter
          with-docusaurus-swizzled --filter with-init --filter
          with-devdocsai-web --filter with-next run build
        env:
          DEVDOCSAI_PROJECT_KEY: ${{ secrets.DEVDOCSAI_PROJECT_KEY }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - uses: codecov/codecov-action@v4
